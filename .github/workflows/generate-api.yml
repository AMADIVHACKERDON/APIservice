name: Generate API Boilerplate
on:
  push:
    paths:
      - 'openapi.yaml'
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Generate Code
        uses: openapi-generators/openapitools-generator-action@v1
        with:
          generator: nodejs-express-server # Change this to your language
          generator-tag: v7.0.0
          openapi-file: openapi.yaml
          command-args: -o ./generated-api
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto-update API boilerplate"
          git push
