name: Generate API Boilerplate
on:
  push:
    paths:
      - 'openapi.yaml'
      - '.github/workflows/generate-api.yml'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Modern API
        uses: openapi-generators/openapitools-generator-action@v1
        with:
          # This generator uses 'import/export' natively
          generator: typescript-node
          generator-tag: v7.0.0
          openapi-file: openapi.yaml
          command-args: >
            -o ./generated-api 
            --additional-properties=npmName=api-service,supportsES6=true,modelPropertyNaming=snake_case

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ./generated-api
          git commit -m "Auto-update API with ESM imports [skip ci]" || echo "No changes"
          git push
