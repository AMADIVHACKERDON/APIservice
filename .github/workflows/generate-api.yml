name: Generate API Boilerplate
on:
  push:
    paths:
      - 'openapi.yaml'
      - '.github/workflows/generate-api.yml'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Modern API (Client)
        uses: openapi-generators/openapitools-generator-action@v1
        with:
          generator: typescript-axios
          generator-tag: v7.0.0
          openapi-file: openapi.yaml
          command-args: >
            -o ./generated-api 
            --additional-properties=npmName=solutions-api-sdk,apiPackage=api,modelPackage=models,withSeparateModelsAndApi=true,useSingleRequestParameter=true,importFileExtension=.js

      - name: Generate Express Server
        uses: openapi-generators/openapitools-generator-action@v1
        with:
          generator: nodejs-express-server
          generator-tag: v7.0.0
          openapi-file: openapi.yaml
          command-args: >
            -o ./generated-server
            --additional-properties=supportES6=true
    
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Add both generated directories
          git add ./generated-api ./generated-server
          git commit -m "Auto-update Client SDK and Server Boilerplate [skip ci]" || echo "No changes"
          git push
