name: Generate API Boilerplate
on:
  push:
    paths:
      - 'openapi.yaml'
      - '.github/workflows/generate-api.yml'
      - 'app/backend/scripts/gen-server.py'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate Client SDK (Axios)
        uses: openapi-generators/openapitools-generator-action@v1.5.0
        with:
          generator: typescript-axios
          generator-tag: v7.0.0
          openapi-file: openapi.yaml
          command-args: >
            -o ./app/generated-api 
            --additional-properties=npmName=solutions-api-sdk,apiPackage=api,modelPackage=models,withSeparateModelsAndApi=true,useSingleRequestParameter=true,importFileExtension=.js

      - name: Generate Clean Express Skeleton
        run: cd ./app/backend && python scripts/gen-server.py

      - name: Install API dependencies
        run: npm install
        working-directory: ./app/generated-api
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ./app/generated-api ./app/backend/server/app-server*.ts
          git add -f ./app/backend/server/test-api*.ts
          git commit -m "Auto-update API types and server skeleton [skip ci]" || echo "No changes"
          git push
          
          