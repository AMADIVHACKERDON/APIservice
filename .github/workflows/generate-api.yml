name: Generate API Boilerplate
on:
  push:
    paths:
      - 'openapi.yaml'
      - '.github/workflows/generate-api.yml'
      - 'scripts/gen-server.py'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate Client SDK (Axios)
        uses: openapi-generators/openapitools-generator-action@v1
        with:
          generator: typescript-axios
          generator-tag: v7.0.0
          openapi-file: openapi.yaml
          # '--global-property' tells it to ONLY generate code, not config files
          command-args: >
            -o ./generated-api 
            --global-property models,apis,supportingFiles=false
            --additional-properties=supportsES6=true,importFileExtension=.js

      - name: Generate Clean Express Skeleton
        run: python scripts/gen-server.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ./generated-api ./src/server/app-server.ts
          git commit -m "Auto-update API types and server skeleton [skip ci]" || echo "No changes"
          git push
