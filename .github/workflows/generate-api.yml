name: Generate API Boilerplate
on:
  push:
    paths:
      - 'openapi.yaml'
      - '.github/workflows/generate-api.yml' # Fixed slash here

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Added this to ensure the bot can push code back
    steps:
      - uses: actions/checkout@v4 # Updated to v4 for better stability

      - name: Generate Code
        uses: openapi-generators/openapitools-generator-action@v1
        with:
          generator: typescript-node # Switch to TypeScript for modern ESM support
          generator-tag: v7.0.0
          openapi-file: openapi.yaml
          command-args: >
            -o ./generated-api 
            --additional-properties=supportsES6=true,modelPropertyNaming=snake_case

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ./generated-api
          git commit -m "Auto-update API boilerplate [skip ci]" || echo "No changes to commit"
          git push
