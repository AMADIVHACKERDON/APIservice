openapi: 3.1.0

info:
  title: Solutions API
  description: REST API for technical solutions organized by categories and subcategories
  version: 1.0.0

servers:
  - url: http://localhost:3000/v1
    description: Local development
  - url: https://example.com/v1
    description: Production

paths:

  # ─────────────────────────────
  # CATEGORIES
  # ─────────────────────────────
  /categories:
    get:
      summary: List categories
      tags: [Categories]
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /categories/{slug}:
    get:
      summary: Get category
      tags: [Categories]
      parameters:
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: Category detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          $ref: "#/components/responses/NotFound"

  /categories/{slug}/solutions:
    get:
      summary: Solutions under category
      tags: [Categories]
      parameters:
        - $ref: "#/components/parameters/SlugParam"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Paginated solutions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSolutions"

  # ─────────────────────────────
  # SUBCATEGORIES
  # ─────────────────────────────
  /subcategories:
    get:
      summary: List subcategories
      tags: [Categories]
      responses:
        "200":
          description: List of subcategories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subcategory"

  /subcategories/{slug}:
    get:
      summary: Get subcategory
      tags: [Categories]
      parameters:
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: Subcategory detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subcategory"
        "404":
          $ref: "#/components/responses/NotFound"

  /subcategories/{slug}/solutions:
    get:
      summary: Solutions under subcategory
      tags: [Solutions]
      parameters:
        - $ref: "#/components/parameters/SlugParam"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Paginated solutions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSolutions"

  # ─────────────────────────────
  # SOLUTIONS
  # ─────────────────────────────
  /solutions:
    get:
      summary: List solutions
      tags: [Solutions]
      description: Search across title and content, optionally filter by subcategory
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: subcategory
          in: query
          required: false
          description: Subcategory ID filter
          schema:
            type: string
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Paginated solutions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSolutions"

    post:
      summary: Create solution
      tags: [Solutions]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SolutionInput"
      responses:
        "201":
          description: Created solution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Solution"

  /solutions/{id}:
    get:
      summary: Get solution
      tags: [Solutions]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Solution detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Solution"

    put:
      summary: Update solution
      tags: [Solutions]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SolutionInput"
      responses:
        "200":
          description: Updated solution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Solution"

    delete:
      summary: Delete solution
      tags: [Solutions]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  /solutions/{id}/helpful:
    post:
      summary: Mark solution helpful
      tags: [Solutions]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Updated helpful count
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  helpful_count:
                    type: integer

  # ─────────────────────────────
  # AUTH
  # ─────────────────────────────
  /auth/register:
    post:
      summary: Register
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"

  /auth/login:
    post:
      summary: Login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Token issued

  # ─────────────────────────────
  # DEVELOPER
  # ─────────────────────────────
  /me/api-key:
    get:
      summary: Get API key
      tags: [Developer]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: API key returned

  /me/api-key/regenerate:
    post:
      summary: Regenerate API key
      tags: [Developer]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: New API key issued

# ─────────────────────────────
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  parameters:

    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string

    SlugParam:
      name: slug
      in: path
      required: true
      schema:
        type: string

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1

    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100

  responses:

    NotFound:
      description: Resource not found

  schemas:

    Category:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }

    Subcategory:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        category_id: { type: string }

    Solution:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        content: { type: string }
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]
        helpful_count:
          type: integer
        subcategory_id:
          type: string
        created_at:
          type: string
          format: date-time

    SolutionInput:
      type: object
      required: [title, content, subcategory_id]
      properties:
        title: { type: string }
        content: { type: string }
        subcategory_id: { type: string }
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]

    PaginatedSolutions:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        data:
          type: array
          items:
            $ref: "#/components/schemas/Solution"

    UserPublic:
      type: object
      properties:
        id: { type: string }
        username: { type: string }

    RegisterInput:
      type: object
      required: [username, email, password]
      properties:
        username: { type: string }
        email: { type: string }
        password: { type: string }

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }
