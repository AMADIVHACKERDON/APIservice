openapi: 3.1.0

info:
  title: Solutions API
  description: REST API for technical solutions organized by categories and subcategories
  version: 1.0.0

servers:
  - url: http://localhost:3000/api/v1
    description: Local development
  - url: https://example.com/api/v1
    description: Production

# ─────────────────────────────
# GLOBAL SECURITY
# Public (read) endpoints override this with `security: []`
# ─────────────────────────────
security:
  - BearerAuth: []

paths:
  # ─────────────────────────────
  # CATEGORIES
  # ─────────────────────────────
  /categories:
    get:
      summary: List categories
      operationId: getCategories
      tags: [Categories]
      security: []         # public read
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /categories/{slug}:
    get:
      summary: Get category
      operationId: getCategoryBySlug
      tags: [Categories]
      security: []         # public read
      parameters:
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: Category detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /categories/{slug}/solutions:
    get:
      summary: Solutions under category
      operationId: getSolutionsByCategory
      tags: [Categories]
      security: []         # public read
      parameters:
        - $ref: "#/components/parameters/SlugParam"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Paginated solutions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSolutions"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ─────────────────────────────
  # SUBCATEGORIES
  # ─────────────────────────────
  /subcategories:
    get:
      summary: List subcategories
      operationId: getSubcategories
      tags: [Categories]
      security: []         # public read
      responses:
        "200":
          description: List of subcategories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subcategory"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /subcategories/{slug}:
    get:
      summary: Get subcategory
      operationId: getSubcategoryBySlug
      tags: [Categories]
      security: []         # public read
      parameters:
        - $ref: "#/components/parameters/SlugParam"
      responses:
        "200":
          description: Subcategory detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subcategory"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /subcategories/{slug}/solutions:
    get:
      summary: Solutions under subcategory
      operationId: getSolutionsBySubcategory
      tags: [Solutions]
      security: []         # public read
      parameters:
        - $ref: "#/components/parameters/SlugParam"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Paginated solutions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSolutions"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ─────────────────────────────
  # SOLUTIONS
  # ─────────────────────────────
  /solutions:
    get:
      summary: List solutions
      operationId: getSolutions
      tags: [Solutions]
      security: []         # public read
      description: Search across title and content, optionally filter by subcategory
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
        - name: subcategory
          in: query
          required: false
          description: Subcategory ID filter
          schema:
            type: string
            maxLength: 100
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Paginated solutions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSolutions"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      summary: Create solution
      operationId: createSolution
      tags: [Solutions]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SolutionInput"
      responses:
        "201":
          description: Created solution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Solution"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /solutions/{id}:
    get:
      summary: Get solution
      operationId: getSolutionById
      tags: [Solutions]
      security: []         # public read
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Solution detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Solution"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    put:
      summary: Update solution
      operationId: updateSolution
      tags: [Solutions]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SolutionInput"
      responses:
        "200":
          description: Updated solution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Solution"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    delete:
      summary: Delete solution
      operationId: deleteSolution
      tags: [Solutions]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /solutions/{id}/helpful:
    post:
      summary: Mark solution helpful
      operationId: markSolutionHelpful
      tags: [Solutions]
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Updated helpful count
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  helpful_count:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Already marked helpful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ─────────────────────────────
  # AUTH
  # ─────────────────────────────
  /auth/register:
    post:
      summary: Register
      operationId: registerUser
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/login:
    post:
      summary: Login
      operationId: loginUser
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ─────────────────────────────
  # DEVELOPER
  # ─────────────────────────────
  /me/api-key:
    get:
      summary: Get API key
      operationId: getApiKey
      tags: [Developer]
      security:
        - BearerAuth: []   # API key cannot be used to fetch itself
      responses:
        "200":
          description: API key returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /me/api-key/regenerate:
    post:
      summary: Regenerate API key
      operationId: regenerateApiKey
      tags: [Developer]
      security:
        - BearerAuth: []   # API key cannot regenerate itself
      responses:
        "200":
          description: New API key issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

# ─────────────────────────────
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Short-lived JWT issued at /auth/login. Include as:
        `Authorization: Bearer <token>`

    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: >
        Long-lived API key obtained from /me/api-key. Include as:
        `x-api-key: <key>`

  parameters:

    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        maxLength: 100
        pattern: '^[a-zA-Z0-9_-]+$'

    SlugParam:
      name: slug
      in: path
      required: true
      schema:
        type: string
        maxLength: 100
        pattern: '^[a-z0-9-]+$'

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
        maximum: 1000

    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  responses:

    BadRequest:
      description: Malformed request syntax or invalid parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: Missing or invalid authentication token
      headers:
        WWW-Authenticate:
          schema:
            type: string
          description: Authentication challenge
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: Authenticated but not authorised to perform this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    UnprocessableEntity:
      description: Request body is syntactically valid but semantically invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"

    TooManyRequests:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the rate limit resets
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
          description: Unix timestamp when the limit resets
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:

    # ── Core domain ──────────────────────────────

    Category:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }

    Subcategory:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        category_id: { type: string }

    Solution:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        content: { type: string }
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]
        helpful_count:
          type: integer
          minimum: 0
        subcategory_id:
          type: string
        created_at:
          type: string
          format: date-time

    SolutionInput:
      type: object
      required: [title, content, subcategory_id]
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 300
        content:
          type: string
          minLength: 10
          maxLength: 50000
        subcategory_id:
          type: string
          maxLength: 100
        difficulty:
          type: string
          enum: [beginner, intermediate, advanced]

    PaginatedSolutions:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        data:
          type: array
          items:
            $ref: "#/components/schemas/Solution"

    # ── Auth ─────────────────────────────────────

    UserPublic:
      type: object
      properties:
        id: { type: string }
        username: { type: string }

    RegisterInput:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          pattern: '^[a-zA-Z0-9_-]+$'
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          format: password     # signals writeOnly / never echo back
          writeOnly: true
          minLength: 8
          maxLength: 128

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          format: password
          writeOnly: true
          minLength: 8
          maxLength: 128

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          description: Seconds until the token expires

    # ── Developer ────────────────────────────────

    ApiKeyResponse:
      type: object
      properties:
        api_key:
          type: string
          writeOnly: true   # treat as a secret; never log or cache client-side
        created_at:
          type: string
          format: date-time

    # ── Errors ───────────────────────────────────

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message
        code:
          type: string
          description: Machine-readable error code

    ValidationErrorResponse:
      type: object
      required: [error, details]
      properties:
        error:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }